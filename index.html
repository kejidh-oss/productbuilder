<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 나를 닮은 동물은?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and Teachable Machine Image library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <main class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        <p class="date-display" id="date-display"></p>
        <h1>인공지능 동물상 테스트</h1>
        <p class="subtitle">나는 어떤 동물을 닮았을까? 지금 바로 확인해보세요!</p>

        <div class="upload-container">
            <div id="upload-area" class="upload-area">
                <div class="upload-icon">📸</div>
                <p>얼굴 사진을 올리거나 눌러서 선택하세요</p>
                <img id="image-preview" class="image-preview" alt="Preview" style="display: none;">
            </div>
            <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>AI가 분석 중입니다...</p>
        </div>

        <div id="result-container" class="result-container" style="display: none;">
            <h2 id="result-message">분석 결과</h2>
            <div id="label-container" class="label-container"></div>
            <button id="retry-btn" class="generate-btn" style="margin-top: 20px;">다시 하기</button>
        </div>

        <section class="contact-section">
            <hr class="divider">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xqegwbno" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>

        <section class="comments-section">
            <hr class="divider">
            <livere-comment client-id="Ckzs0Or5nXJDytQBvJuJ"></livere-comment>
            <script type="module" src="https://www.livere.org/livere-widget.js"></script>
        </section>
    </main>
    <script src="main.js" type="module"></script>
</body>
</html>
